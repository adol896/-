<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responcive SuperChat Max Mode (Chroma-Key)</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #00FF00; overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        /* 1. 通常の木目調看板カットイン */
        #phrase-cutin-box {
            position: absolute; top: 45%; left: 50%; 
            width: 90%; max-width: 600px; height: 110px;
            display: flex; align-items: center; justify-content: center;
            z-index: 50; pointer-events: none; 
            background: repeating-linear-gradient(90deg, #3d2314, #3d2314 4px, #2b180d 4px, #2b180d 8px),
                        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
            background-blend-mode: multiply;
            border: 5px solid #1a0f08; border-radius: 4px;
            box-shadow: 0 0 30px #ff6600, 0 0 60px #8000ff, inset 0 0 20px rgba(0, 0, 0, 0.8);
            transform: translate(100vw, -50%) skewX(-10deg); opacity: 0; transition: none;
        }
        #phrase-cutin-box.slide-in {
            opacity: 1; transform: translate(-50%, -50%) skewX(-10deg);
            transition: transform 0.25s cubic-bezier(0.075, 0.82, 0.165, 1), opacity 0.15s ease-out;
        }
        #phrase-cutin-box.slide-out {
            opacity: 0; transform: translate(-150vw, -50%) skewX(-10deg);
            transition: transform 0.2s ease-in, opacity 0.15s ease-in;
        }
        #phrase-text-content { 
            font-size: 38px; font-weight: 900; font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 6px; color: #ff9900; text-shadow: 0 0 8px #000, 0 0 20px #8000ff, 2px 2px 2px #3a0000;
        }
        @media (min-width: 768px) {
            #phrase-text-content { font-size: 58px; letter-spacing: 10px; }
        }

        /* 2. スパチャ用ポップアップ（スマホ対応・真ん中配置） */
        #sc-popup-box {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -30%); 
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            border: 4px solid #ffffff; border-radius: 16px;
            padding: 14px 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 40px rgba(255, 215, 0, 0.8);
            z-index: 60; pointer-events: none; opacity: 0;
            box-sizing: border-box;
            max-width: 85%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
        }
        #sc-popup-box.show {
            transform: translate(-50%, -50%); opacity: 1;
        }
        #sc-text-content {
            font-size: 26px; font-weight: 900; color: #ffffff;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.4);
            white-space: nowrap; text-align: center;
        }
        @media (min-width: 768px) {
            #sc-popup-box { padding: 22px 45px; border-width: 5px; }
            #sc-text-content { font-size: 42px; }
        }

        /* 3. 紙吹雪を描画する前面Canvas */
        #canvas-confetti {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 70; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 紙吹雪用キャンバス -->
    <canvas id="canvas-confetti"></canvas>

    <!-- 通常カットイン -->
    <div id="phrase-cutin-box">
        <div id="phrase-text-content"></div>
    </div>

    <!-- スパチャポップアップ -->
    <div id="sc-popup-box">
        <div id="sc-text-content">ありがとうございます！</div>
    </div>

    <script>
        let isRecognitionActive = false; 
        const sePlayer = new Audio("剣を抜く.mp3");
        sePlayer.volume = 0.5; 

        // Web Audio API によるスパチャ用キラキラSE合成
        function playSuperChatSynthSE() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            const now = ctx.currentTime;
            
            const frequencies = [523.25, 659.25, 783.99, 1046.5]; 
            
            frequencies.forEach((freq, index) => {
                const timeOffset = index * 0.06; 
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = index % 2 === 0 ? 'sine' : 'triangle';
                osc.frequency.setValueAtTime(freq, now + timeOffset);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.2, now + timeOffset + 0.4);
                
                gain.gain.setValueAtTime(0.2, now + timeOffset);
                gain.gain.exponentialRampToValueAtTime(0.001, now + timeOffset + 0.4);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start(now + timeOffset);
                osc.stop(now + timeOffset + 0.45);
            });
        }

        // Canvasによる紙吹雪（テロップの両脇から前面へ盛大に爆発）
        const canvas = document.getElementById('canvas-confetti');
        const canvasCtx = canvas.getContext('2d');
        let confettiParticles = [];
        let confettiTimer = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function initConfetti() {
            confettiParticles = [];
            const colors = ['#ffd700', '#ff4e50', '#6c5ce7', '#00ea97', '#ff7675', '#0984e3'];
            
            const centerX = canvas.width * 0.5;
            const centerY = canvas.height * 0.45;

            // テロップ要素の実際の横幅を自動計測
            const popBox = document.getElementById('sc-popup-box');
            const rect = popBox.getBoundingClientRect();
            const halfWidth = rect.width / 2;
            
            const leftEmitterX = centerX - halfWidth;
            const rightEmitterX = centerX + halfWidth;

            // 合計300枚の紙吹雪を左右150枚ずつ前面に向けて大噴射
            for (let i = 0; i < 300; i++) {
                const isLeft = i < 150;
                const startX = isLeft ? leftEmitterX : rightEmitterX;
                
                let angle;
                if (isLeft) {
                    angle = Math.PI * 0.95 + Math.random() * (Math.PI * 0.45); 
                } else {
                    angle = Math.PI * 1.60 + Math.random() * (Math.PI * 0.45); 
                }
                
                const speed = Math.random() * 13 + 6;

                confettiParticles.push({
                    x: startX,
                    y: centerY,
                    size: Math.random() * 6 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedX: Math.cos(angle) * speed,
                    speedY: Math.sin(angle) * speed - 4,
                    gravity: 0.26,
                    friction: 0.94,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 16 - 8,
                    opacity: 1,
                    fadeSpeed: 1 / (60 * 3) // 3秒で消滅
                });
            }
        }

        function updateConfetti() {
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            let hasVisibleParticles = false;

            confettiParticles.forEach(p => {
                p.speedX *= p.friction;
                p.speedY *= p.friction;
                p.speedY += p.gravity;

                p.x += p.speedX;
                p.y += p.speedY;
                p.rotation += p.rotationSpeed;
                p.opacity -= p.fadeSpeed;

                if (p.opacity > 0) {
                    hasVisibleParticles = true;
                    canvasCtx.save();
                    canvasCtx.translate(p.x, p.y);
                    canvasCtx.rotate((p.rotation * Math.PI) / 180);
                    
                    canvasCtx.globalAlpha = p.opacity; 
                    canvasCtx.fillStyle = p.color;
                    canvasCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    canvasCtx.restore();
                }
            });

            canvasCtx.globalAlpha = 1.0;

            if (hasVisibleParticles) {
                confettiTimer = requestAnimationFrame(updateConfetti);
            } else {
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function triggerSuperChatEffects() {
            const popBox = document.getElementById('sc-popup-box');
            popBox.classList.add('show');

            setTimeout(() => {
                if (confettiTimer) cancelAnimationFrame(confettiTimer);
                resizeCanvas();
                initConfetti();
                updateConfetti();
                playSuperChatSynthSE();
            }, 50);

            // 3秒後に閉じる
            setTimeout(() => {
                popBox.classList.remove('show');
            }, 3000);
        }

        // 通常のワードカットインエフェクト
        function executePhraseCutIn(targetWord) {
            const box = document.getElementById('phrase-cutin-box');
            document.getElementById('phrase-text-content').innerText = targetWord;

            box.className = ""; 
            setTimeout(() => { box.classList.add('slide-in'); }, 50);

            setTimeout(() => {
                try {
                    sePlayer.currentTime = 0; sePlayer.play();          
                } catch (audioErr) { console.error(audioErr); }
            }, 300);

            setTimeout(() => {
                box.classList.remove('slide-in'); box.classList.add('slide-out');
            }, 2200);
        }

        // 音声認識のセットアップ
        const WebKitSpeech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (WebKitSpeech) {
            const voiceRecognition = new WebKitSpeech();
            voiceRecognition.lang = 'ja-JP';
            voiceRecognition.continuous = true;      
            voiceRecognition.interimResults = false; 

            voiceRecognition.onstart = () => { isRecognitionActive = true; };
            voiceRecognition.onend = () => { isRecognitionActive = false; safeStartRecognition(); };
            voiceRecognition.onerror = (e) => { if (e.error === "not-allowed") isRecognitionActive = false; };

            voiceRecognition.onresult = (event) => {
                const currentIndex = event.resultIndex;
                const heardPhrase = event.results[currentIndex][0].transcript.trim();
                
                // 【アップデート】スパチャ系ワードに加え、「ありがとうございまーす」「ありがとうございます」にも反応
                if (heardPhrase.includes("スパチャ") || 
                    heardPhrase.includes("スーパーチャット") || 
                    heardPhrase.includes("ありがとうございまーす") || 
                    heardPhrase.includes("ありがとうございます")) {
                    triggerSuperChatEffects();
                }
                // 元のカットイン判定
                else if (heardPhrase.includes("ここだ")) {
                    executePhraseCutIn("ここだ！");
                } 
                else if (heardPhrase.includes("ここで決める") || heardPhrase.includes("これで決める")) {
                    executePhraseCutIn("これで決める！");
                }
            };

            function safeStartRecognition() {
                if (!isRecognitionActive) {
                    try { voiceRecognition.start(); } catch (e) {}
                }
            }

            setInterval(() => { if (!isRecognitionActive) safeStartRecognition(); }, 1000);
            document.body.addEventListener('click', () => { safeStartRecognition(); });
        } else {
            alert("Speech API 非対応ブラウザです。Chrome等を使用してください。");
        }
    </script>
</body>
</html>
